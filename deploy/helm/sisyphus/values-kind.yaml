# Minimal values for a local kind smoke test of the whole stack.
#
# Build + load the image first:
#   docker build -f deploy/Dockerfile -t sisyphus:kind .
#   kind load docker-image sisyphus:kind --name <your-cluster>
#
# Then:
#   helm upgrade --install sisyphus deploy/helm/sisyphus \
#     -n sisyphus --create-namespace -f values-kind.yaml
#
# Everything else is zero-config: the app's bearer tokens and the sandbox SSH
# keypair are both generated by the chart on first install (see README.md
# "Secrets" and "Sandbox"). External creds (GitLab/Jira/Telegram/OpenRouter)
# are left blank — nothing to generate there, and the app tolerates it.

image:
  repository: sisyphus
  tag: kind
  # Never pull — force use of the image kind just loaded onto the node.
  pullPolicy: Never

# kind's local-path provisioner is ReadWriteOnce only; the chart's default
# git-workdir PVC needs RWX. Fall back to Postgres-only doc bodies + no
# sandbox /repos mount (see deploy/helm/README.md "Storage").
gitWorkdir:
  shared: false

config:
  context:
    # No OpenRouter key configured, so leave agentic off — AgenticAnswerer
    # would silently fall back anyway, but this makes it explicit.
    agentic: false
