# Example values: a realistic deployment — corporate GitLab + Jira reachable only
# through a SOCKS proxy, a Grafana with several VictoriaLogs datasources, the
# Telegram bot, and the SSH sandbox. All hosts/IDs below are placeholders.
#
#   helm upgrade --install sisyphus deploy/helm/sisyphus \
#     -n sisyphus --create-namespace \
#     -f values-example.yaml \
#     --set-file sandbox.ssh.privateKey=ssh/id_ed25519 \
#     --set-file sandbox.ssh.hostKey=ssh/ssh_host_ed25519_key \
#     --set-file sandbox.ssh.authorizedKeys=ssh/id_ed25519.pub \
#     --set-file sandbox.ssh.hostKeyPub=ssh/ssh_host_ed25519_key.pub
#
# Secrets belong in a pre-created Secret (secrets.existingSecret) or on the
# command line — never in a values file in git.

image:
  repository: ghcr.io/go-faster/sisyphus
  tag: "0.1.0"

proxy:
  enabled: true
  url: socks5h://proxy.internal.example:1080

secrets:
  existingSecret: sisyphus-secrets

gitWorkdir:
  storageClass: nfs-csi # any RWX class
  size: 20Gi

postgres:
  persistence:
    storageClass: local-path
qdrant:
  persistence:
    storageClass: local-path
ollama:
  persistence:
    storageClass: local-path
  gpu:
    enabled: true

sandbox:
  enabled: true
  mode: ssh
  image: registry.example.com/sisyphus-sandbox:0.1.0

otelcol:
  exporter:
    endpoint: telemetry.example.com:4317

mcp:
  gateway:
    # the glab stdio upstream talks to the corporate GitLab
    proxy: true
    image: registry.example.com/mcpgateway-glab:0.4.1 # mcpgateway + glab, see README
  stdioUpstreams:
    gitlab:
      enabled: true
      env:
        GITLAB_HOST: gitlab.example.com
        GITLAB_URI: gitlab.example.com
        GL_HOST: gitlab.example.com
  servers:
    jira:
      enabled: true
      env:
        JIRA_URL: https://jira.example.com
        JIRA_USERNAME: svc-sisyphus
        READ_ONLY_MODE: "true"
        ENABLED_TOOLS: "jira_get_issue,jira_search,jira_search_fields,jira_get_transitions,jira_get_all_projects,jira_search_assignable_users"

    grafana:
      enabled: true
      env:
        GRAFANA_URL: https://grafana.example.com

    # One VictoriaLogs MCP per logs datasource: same shape, different datasource
    # UID and gateway prefix. Copy the block per environment.
    vmlogs-dev:
      enabled: true
      image: ghcr.io/victoriametrics/mcp-victorialogs:v1.9.0
      port: 8000
      proxy: true
      probe: http
      probePath: /health/liveness
      env:
        MCP_SERVER_MODE: http
        MCP_LISTEN_ADDR: ":8000"
        VL_INSTANCE_ENTRYPOINT: https://grafana.example.com/api/datasources/proxy/uid/REPLACE_DEV_UID
        # the upstream default (0:0) returns nothing through a Grafana datasource proxy
        VL_DEFAULT_TENANT_ID: "1:1"
        VL_INSTANCE_HEADERS: "Authorization=Bearer $(GRAFANA_SERVICE_ACCOUNT_TOKEN)"
      secretEnv:
        GRAFANA_SERVICE_ACCOUNT_TOKEN: GRAFANA_SERVICE_ACCOUNT_TOKEN
      gateway:
        prefix: "vmlogs_dev."
        allow: ["*"]

    vmlogs-prod:
      enabled: true
      image: ghcr.io/victoriametrics/mcp-victorialogs:v1.9.0
      port: 8000
      proxy: true
      probe: http
      probePath: /health/liveness
      env:
        MCP_SERVER_MODE: http
        MCP_LISTEN_ADDR: ":8000"
        VL_INSTANCE_ENTRYPOINT: https://grafana.example.com/api/datasources/proxy/uid/REPLACE_PROD_UID
        VL_DEFAULT_TENANT_ID: "1:1"
        VL_INSTANCE_HEADERS: "Authorization=Bearer $(GRAFANA_SERVICE_ACCOUNT_TOKEN)"
      secretEnv:
        GRAFANA_SERVICE_ACCOUNT_TOKEN: GRAFANA_SERVICE_ACCOUNT_TOKEN
      gateway:
        prefix: "vmlogs_prod."
        allow: ["*"]

alertmanager:
  enabled: true
vmalert:
  enabled: true
  datasource:
    url: https://grafana.example.com/api/datasources/proxy/uid/REPLACE_METRICS_UID
  rules:
    api-alerts.yaml: |
      groups:
        - name: api
          rules: []

config:
  context:
    agentic: true
    sandbox_machine: sandbox
  proxies:
    git: socks5h://proxy.internal.example:1080
    gitlab: socks5h://proxy.internal.example:1080
    jira: socks5h://proxy.internal.example:1080
  git:
    token:
      env: SISYPHUS_GITLAB_TOKEN
    repos:
      - url: https://gitlab.example.com/group/documentation.git
        repo: group/documentation
        branch: main
        base_url: https://gitlab.example.com/group/documentation/-/blob/main
        commits: false
      - url: https://gitlab.example.com/group/backend.git
        repo: group/backend
        branch: main
        base_url: https://gitlab.example.com/group/backend/-/blob/main
        commits: true
        manifests: true
        code: true
  gitlab:
    base_url: https://gitlab.example.com
    token:
      env: SISYPHUS_GITLAB_TOKEN
    projects:
      - ref: group/backend
      - ref: group/frontend
    issues: true
    merge_requests: true
    releases: true
    poll:
      interval_seconds: 300
  jira:
    base_url: https://jira.example.com
    username: svc-sisyphus
    password:
      env: SISYPHUS_JIRA_PASSWORD
    projects:
      - key: PROJ
    poll:
      interval_seconds: 300
  telegram:
    # app_id must be a literal int — the app has no env indirection for it.
    app_id: 0
    app_hash:
      env: SISYPHUS_TELEGRAM_APP_HASH
    bot_token:
      env: SISYPHUS_TELEGRAM_BOT_TOKEN
    # the bot fails closed: empty allowlists mean it ignores every message
    allowed_chats: []
    allowed_user_ids: []
