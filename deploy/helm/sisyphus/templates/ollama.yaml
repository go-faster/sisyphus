{{- if .Values.ollama.enabled }}
{{- $full := include "sisyphus.fullname" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $full }}-ollama
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 11434
      targetPort: http
  selector:
    {{- include "sisyphus.selectorLabels" (dict "root" . "component" "ollama") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $full }}-ollama
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  serviceName: {{ $full }}-ollama
  replicas: 1
  selector:
    matchLabels:
      {{- include "sisyphus.selectorLabels" (dict "root" . "component" "ollama") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sisyphus.labels" . | nindent 8 }}
        {{- include "sisyphus.selectorLabels" (dict "root" . "component" "ollama") | nindent 8 }}
    spec:
      {{- include "sisyphus.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: ollama
          image: {{ .Values.ollama.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
            {{- include "sisyphus.otelEnv" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 11434
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- $res := deepCopy .Values.ollama.resources }}
            {{- if .Values.ollama.gpu.enabled }}
            {{- $_ := set (index $res "limits") .Values.ollama.gpu.resourceName .Values.ollama.gpu.count }}
            {{- end }}
            {{- toYaml $res | nindent 12 }}
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      {{- with .Values.ollama.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ollama.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ollama.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: models
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.ollama.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.ollama.persistence.size }}
{{- if .Values.ollama.pullModels }}
---
{{- /* Pulls the embedding model(s) once ollama answers. Without this the first
       ingest run fails: bge-m3 is not in the image. */}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $full }}-ollama-pull
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama-pull
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "sisyphus.labels" . | nindent 8 }}
        app.kubernetes.io/component: ollama-pull
    spec:
      restartPolicy: OnFailure
      {{- include "sisyphus.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: pull
          image: {{ .Values.ollama.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: OLLAMA_HOST
              value: {{ include "sisyphus.ollama.url" . | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              until ollama list >/dev/null 2>&1; do
                echo "waiting for ollama at $OLLAMA_HOST"
                sleep 3
              done
              {{- range .Values.ollama.pullModels }}
              ollama pull {{ . | quote }}
              {{- end }}
          resources:
            limits: {cpu: 500m, memory: 256Mi}
            requests: {cpu: 100m, memory: 64Mi}
{{- end }}
{{- end }}
