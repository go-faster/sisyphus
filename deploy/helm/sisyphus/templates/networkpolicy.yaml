{{- if and .Values.networkPolicy.enabled .Values.sandbox.enabled }}
{{- $full := include "sisyphus.fullname" . }}
{{- $ssh := eq .Values.sandbox.mode "ssh" }}
{{- /*
  The sandbox runs shell commands chosen by an LLM over untrusted ingested
  content. It gets:
    - no egress at all (not even DNS), and
    - ingress only from its MCP front-end (ssh-mcp, or the gateway in mcp mode).
  This is the k8s equivalent of the compose `sandbox_internal` internal network.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $full }}-sandbox
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: sandbox
spec:
  podSelector:
    matchLabels:
      {{- include "sisyphus.selectorLabels" (dict "root" . "component" "sandbox") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  egress: []
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- if $ssh }}
              {{- include "sisyphus.selectorLabels" (dict "root" . "component" "ssh-mcp") | nindent 14 }}
              {{- else }}
              {{- include "sisyphus.selectorLabels" (dict "root" . "component" "mcpgateway") | nindent 14 }}
              {{- end }}
      ports:
        {{- if $ssh }}
        - protocol: TCP
          port: {{ .Values.sandbox.ssh.port }}
        {{- else }}
        - protocol: TCP
          port: {{ .Values.sandbox.mcp.port }}
        {{- end }}
{{- end }}
