{{- if .Values.mcp.gateway.enabled }}
{{- $full := include "sisyphus.fullname" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $full }}-mcpgateway
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcpgateway
spec:
  type: {{ .Values.mcp.gateway.service.type }}
  ports:
    - name: http
      port: {{ .Values.mcp.gateway.port }}
      targetPort: http
  selector:
    {{- include "sisyphus.selectorLabels" (dict "root" . "component" "mcpgateway") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $full }}-mcpgateway
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcpgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sisyphus.selectorLabels" (dict "root" . "component" "mcpgateway") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/gateway: {{ include (print $.Template.BasePath "/configmap-gateway.yaml") . | sha256sum }}
      labels:
        {{- include "sisyphus.labels" . | nindent 8 }}
        {{- include "sisyphus.selectorLabels" (dict "root" . "component" "mcpgateway") | nindent 8 }}
    spec:
      {{- include "sisyphus.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "sisyphus.serviceAccountName" . }}
      containers:
        - name: mcpgateway
          image: {{ .Values.mcp.gateway.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-config"
            - "/data/gateway.toml"
            - "-transport"
            - "streamable-http"
            - "-addr"
            - ":{{ .Values.mcp.gateway.port }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            {{- include "sisyphus.otelEnv" . | nindent 12 }}
            {{- if .Values.mcp.gateway.proxy }}
            {{- include "sisyphus.proxyEnv" . | nindent 12 }}
            {{- end }}
          {{- /* stdio upstreams read their secrets from the gateway's own env. */}}
          envFrom:
            {{- include "sisyphus.appEnvFrom" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.mcp.gateway.port }}
          readinessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mcp.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: gateway-config
              mountPath: /data/gateway.toml
              subPath: gateway.toml
              readOnly: true
      volumes:
        - name: gateway-config
          configMap:
            name: {{ $full }}-gateway
      {{- with .Values.mcp.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.gateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.gateway.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
