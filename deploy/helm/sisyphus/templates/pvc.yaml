{{- $full := include "sisyphus.fullname" . }}
{{- if .Values.gitWorkdir.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $full }}-git-workdir
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: git-workdir
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    {{- toYaml .Values.gitWorkdir.accessModes | nindent 4 }}
  {{- with .Values.gitWorkdir.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.gitWorkdir.size }}
{{- end }}
{{- if .Values.ssbot.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $full }}-ssbot-session
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: ssbot
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.session.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.session.size }}
{{- end }}
{{- if .Values.ssingest.enabled }}
---
{{- /* ssingest keeps the Telegram *user* session; ssbot keeps the *bot* session.
       Different files, so each gets its own RWO volume instead of sharing one. */}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $full }}-ssingest-session
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: ssingest
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.session.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.session.size }}
{{- end }}
