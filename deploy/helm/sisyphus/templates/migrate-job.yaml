{{- if and .Values.ssapi.enabled .Values.migrateJob.enabled }}
{{- $full := include "sisyphus.fullname" . }}
{{- /* Applies pending schema migrations exactly once per install/upgrade,
       before any serving Deployment (ssapi, ssingest, ...) is created or
       updated — Helm blocks on pre-install/pre-upgrade hooks before applying
       the rest of the release. This is what lets ssapi run N replicas: no
       replica migrates itself, so there is nothing to race on
       schema_migrations. Runner.Run also takes a Postgres advisory lock, so
       even two overlapping `helm upgrade` runs serialize instead of racing. */}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $full }}-migrate
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-3"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrateJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "sisyphus.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      {{- include "sisyphus.imagePullSecrets" . | nindent 6 }}
      restartPolicy: Never
      serviceAccountName: {{ include "sisyphus.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "sisyphus.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/ssapi", "migrate"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            {{- include "sisyphus.appEnv" . | nindent 12 }}
          envFrom:
            {{- include "sisyphus.appEnvFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.migrateJob.resources | nindent 12 }}
          volumeMounts:
            {{- include "sisyphus.configMount" . | nindent 12 }}
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- include "sisyphus.configVolume" . | nindent 8 }}
        - name: tmp
          emptyDir: {}
{{- end }}
