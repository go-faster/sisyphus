{{- if .Values.ssapi.enabled }}
{{- $full := include "sisyphus.fullname" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $full }}-ssapi
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: ssapi
spec:
  type: {{ .Values.ssapi.service.type }}
  ports:
    - name: http
      port: {{ .Values.ssapi.service.port }}
      targetPort: http
  selector:
    {{- include "sisyphus.selectorLabels" (dict "root" . "component" "ssapi") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $full }}-ssapi
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: ssapi
spec:
  replicas: {{ .Values.ssapi.replicas }}
  selector:
    matchLabels:
      {{- include "sisyphus.selectorLabels" (dict "root" . "component" "ssapi") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-config.yaml") . | sha256sum }}
        {{- with .Values.ssapi.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "sisyphus.labels" . | nindent 8 }}
        {{- include "sisyphus.selectorLabels" (dict "root" . "component" "ssapi") | nindent 8 }}
    spec:
      {{- include "sisyphus.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "sisyphus.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: ssapi
          image: {{ include "sisyphus.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/ssapi"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            {{- include "sisyphus.appEnv" . | nindent 12 }}
          envFrom:
            {{- include "sisyphus.appEnvFrom" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.ssapi.service.port }}
          readinessProbe:
            httpGet: {path: /ready, port: http}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ssapi.resources | nindent 12 }}
          volumeMounts:
            {{- include "sisyphus.configMount" . | nindent 12 }}
            - name: tmp
              mountPath: /tmp
            {{- if and .Values.gitWorkdir.enabled .Values.gitWorkdir.shared }}
            - name: git-workdir
              mountPath: {{ .Values.gitWorkdir.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        {{- include "sisyphus.configVolume" . | nindent 8 }}
        - name: tmp
          emptyDir: {}
        {{- if and .Values.gitWorkdir.enabled .Values.gitWorkdir.shared }}
        - name: git-workdir
          persistentVolumeClaim:
            claimName: {{ $full }}-git-workdir
            readOnly: true
        {{- end }}
      {{- with .Values.ssapi.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ssapi.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ssapi.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
