{{- if .Values.ssingest.enabled }}
{{- $full := include "sisyphus.fullname" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $full }}-ssingest
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: ssingest
spec:
  type: {{ .Values.ssingest.webhooks.service.type }}
  ports:
    - name: http
      port: {{ .Values.ssingest.port }}
      targetPort: http
  selector:
    {{- include "sisyphus.selectorLabels" (dict "root" . "component" "ssingest") | nindent 4 }}
---
{{- /* `ssingest serve` is the single ingestion scheduler: one replica, and a
       Recreate strategy so a rollout never has two of them racing on the same
       source rows (or on the RWO session volume). */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $full }}-ssingest
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: ssingest
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "sisyphus.selectorLabels" (dict "root" . "component" "ssingest") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-config.yaml") . | sha256sum }}
        {{- with .Values.ssingest.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "sisyphus.labels" . | nindent 8 }}
        {{- include "sisyphus.selectorLabels" (dict "root" . "component" "ssingest") | nindent 8 }}
    spec:
      {{- include "sisyphus.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "sisyphus.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.ssapi.enabled }}
      initContainers:
        {{- /* Schema migrations run once via migrateJob's hook, before this
               Deployment is even created. This wait is a belt-and-braces
               readiness check: ssapi's own /ready fails while any migration
               is still pending, so waiting on it also means ssingest never
               starts against a schema it does not know yet. */}}
        - name: wait-for-ssapi
          image: {{ .Values.waitImage | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              until wget -q -O- "http://{{ $full }}-ssapi:{{ .Values.ssapi.service.port }}/ready"; do
                echo "waiting for ssapi"
                sleep 3
              done
          resources:
            limits: {cpu: 100m, memory: 64Mi}
            requests: {cpu: 10m, memory: 16Mi}
      {{- end }}
      containers:
        - name: ssingest
          image: {{ include "sisyphus.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/ssingest", "serve"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            {{- include "sisyphus.appEnv" . | nindent 12 }}
          envFrom:
            {{- include "sisyphus.appEnvFrom" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.ssingest.port }}
          readinessProbe:
            httpGet: {path: /ready, port: http}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ssingest.resources | nindent 12 }}
          volumeMounts:
            {{- include "sisyphus.configMount" . | nindent 12 }}
            - name: tmp
              mountPath: /tmp
            - name: session
              mountPath: {{ .Values.session.mountPath }}
            {{- if .Values.gitWorkdir.enabled }}
            - name: git-workdir
              mountPath: {{ .Values.gitWorkdir.mountPath }}
            {{- end }}
      volumes:
        {{- include "sisyphus.configVolume" . | nindent 8 }}
        - name: tmp
          emptyDir: {}
        - name: session
          persistentVolumeClaim:
            claimName: {{ $full }}-ssingest-session
        {{- if .Values.gitWorkdir.enabled }}
        - name: git-workdir
          persistentVolumeClaim:
            claimName: {{ $full }}-git-workdir
        {{- end }}
      {{- with .Values.ssingest.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ssingest.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ssingest.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
