{{- $full := include "sisyphus.fullname" . }}
{{- if .Values.alertmanager.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $full }}-alertmanager
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
data:
  alertmanager.yml: |
    {{- toYaml .Values.alertmanager.config | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $full }}-alertmanager
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.alertmanager.port }}
      targetPort: http
  selector:
    {{- include "sisyphus.selectorLabels" (dict "root" . "component" "alertmanager") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $full }}-alertmanager
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
spec:
  serviceName: {{ $full }}-alertmanager
  replicas: 1
  selector:
    matchLabels:
      {{- include "sisyphus.selectorLabels" (dict "root" . "component" "alertmanager") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ toYaml .Values.alertmanager.config | sha256sum }}
      labels:
        {{- include "sisyphus.labels" . | nindent 8 }}
        {{- include "sisyphus.selectorLabels" (dict "root" . "component" "alertmanager") | nindent 8 }}
    spec:
      {{- include "sisyphus.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alertmanager
          image: {{ .Values.alertmanager.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.alertmanager.port }}
          readinessProbe:
            httpGet: {path: /-/ready, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /-/healthy, port: http}
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.alertmanager.resources | nindent 12 }}
          volumeMounts:
            - name: conf
              mountPath: /etc/alertmanager
              readOnly: true
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: conf
          configMap:
            name: {{ $full }}-alertmanager
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.alertmanager.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.alertmanager.persistence.size }}
{{- end }}
{{- if .Values.vmalert.enabled }}
---
{{- if .Values.vmalert.rules }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $full }}-vmalert-rules
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: vmalert
data:
  {{- range $file, $content := .Values.vmalert.rules }}
  {{ $file }}: |
    {{- $content | nindent 4 }}
  {{- end }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $full }}-vmalert
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: vmalert
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.vmalert.port }}
      targetPort: http
  selector:
    {{- include "sisyphus.selectorLabels" (dict "root" . "component" "vmalert") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $full }}-vmalert
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: vmalert
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sisyphus.selectorLabels" (dict "root" . "component" "vmalert") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/rules: {{ toYaml .Values.vmalert.rules | sha256sum }}
      labels:
        {{- include "sisyphus.labels" . | nindent 8 }}
        {{- include "sisyphus.selectorLabels" (dict "root" . "component" "vmalert") | nindent 8 }}
    spec:
      {{- include "sisyphus.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vmalert
          image: {{ .Values.vmalert.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-datasource.url={{ required "vmalert.datasource.url is required when vmalert is enabled" .Values.vmalert.datasource.url }}"
            {{- if .Values.vmalert.datasource.bearerTokenSecretKey }}
            - "-datasource.bearerToken=$(DATASOURCE_TOKEN)"
            {{- end }}
            {{- if .Values.alertmanager.enabled }}
            - "-notifier.url=http://{{ $full }}-alertmanager:{{ .Values.alertmanager.port }}"
            {{- end }}
            {{- if .Values.vmalert.rules }}
            - "-rule=/etc/vmalert/rules/*.yaml"
            {{- end }}
            {{- range $i, $cm := .Values.vmalert.extraRuleConfigMaps }}
            - "-rule=/etc/vmalert/rules/extra-{{ $i }}/*.yaml"
            {{- end }}
            - "-httpListenAddr=:{{ .Values.vmalert.port }}"
            - "-evaluationInterval={{ .Values.vmalert.evaluationInterval }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            {{- if .Values.vmalert.datasource.bearerTokenSecretKey }}
            - name: DATASOURCE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "sisyphus.secretName" . }}
                  key: {{ .Values.vmalert.datasource.bearerTokenSecretKey }}
            {{- end }}
            {{- if .Values.vmalert.proxy }}
            {{- include "sisyphus.proxyEnv" . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.vmalert.port }}
          readinessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.vmalert.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.vmalert.rules }}
            - name: rules
              mountPath: /etc/vmalert/rules
              readOnly: true
            {{- end }}
            {{- range $i, $cm := .Values.vmalert.extraRuleConfigMaps }}
            - name: rules-extra-{{ $i }}
              mountPath: /etc/vmalert/rules/extra-{{ $i }}
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.vmalert.rules }}
        - name: rules
          configMap:
            name: {{ $full }}-vmalert-rules
        {{- end }}
        {{- range $i, $cm := .Values.vmalert.extraRuleConfigMaps }}
        - name: rules-extra-{{ $i }}
          configMap:
            name: {{ $cm }}
        {{- end }}
{{- end }}
