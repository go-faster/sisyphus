{{- if .Values.qdrant.enabled }}
{{- $full := include "sisyphus.fullname" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $full }}-qdrant
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 6333
      targetPort: http
    - name: grpc
      port: 6334
      targetPort: grpc
  selector:
    {{- include "sisyphus.selectorLabels" (dict "root" . "component" "qdrant") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $full }}-qdrant
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ $full }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      {{- include "sisyphus.selectorLabels" (dict "root" . "component" "qdrant") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sisyphus.labels" . | nindent 8 }}
        {{- include "sisyphus.selectorLabels" (dict "root" . "component" "qdrant") | nindent 8 }}
    spec:
      {{- include "sisyphus.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: qdrant
          image: {{ .Values.qdrant.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: QDRANT__SERVICE__METRICS_PREFIX
              value: qdrant
            {{- include "sisyphus.otelEnv" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
          volumeMounts:
            - name: storage
              mountPath: /qdrant/storage
      {{- with .Values.qdrant.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.qdrant.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.qdrant.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.qdrant.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
{{- end }}
