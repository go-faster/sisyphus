{{- if not .Values.secrets.existingSecret }}
{{- $secretName := printf "%s-secrets" (include "sisyphus.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{/* Bearer tokens the app's own SecurityHandler checks (see CLAUDE.md "API
     auth"): random-generate them when left blank, so `helm install` with no
     -f works out of the box. `lookup` pins them to whatever is already
     deployed, so an upgrade never rotates a token out from under a running
     client. External creds (GitLab/Jira/Telegram/OpenRouter/...) are never
     generated — there's nothing to generate, they come from you. */}}
{{- $generated := list "SISYPHUS_API_AUTH_TOKEN" "SISYPHUS_AGENT_AUTH_TOKEN" "SISYPHUS_MCP_AUTH_TOKEN" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "sisyphus.labels" . | nindent 4 }}
  {{- with .Values.secrets.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.values }}
  {{- if and (not $v) (has $k $generated) }}
  {{- $prior := dig "data" $k "" $existing }}
  {{- if $prior }}
  {{ $k }}: {{ $prior | b64dec | quote }}
  {{- else }}
  {{ $k }}: {{ randAlphaNum 40 | quote }}
  {{- end }}
  {{- else }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
  {{- if not (hasKey .Values.secrets.values "SISYPHUS_DATABASE_DSN") }}
  SISYPHUS_DATABASE_DSN: {{ include "sisyphus.postgres.dsn" . | quote }}
  {{- end }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  {{- end }}
{{- end }}
