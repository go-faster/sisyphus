http_addr: :8080
mcp_addr: :8081
database_dsn:
  env: SCPBOT_DATABASE_DSN

qdrant_addr: qdrant:6334
qdrant_collection: corp_chunks

ollama_url: http://ollama:11434
embed_provider: ollama
embed_model: bge-m3
embed_dim: 1024

# git: repository content (Markdown docs) + commit messages. Supports N repos;
# each is keyed independently (git_docs:<repo> / git_commits:<repo>).
git:
  work_dir: /data/git
  token:
    env: SCPBOT_GIT_TOKEN
  repos:
    - url: https://gitlab.example.com/group/docs.git
      repo: docs
      branch: main
      base_url: ""
      # commits: index commit messages on the default branch (default false).
      commits: false
      # include/exclude: doublestar globs over repo-relative paths, applied on
      # top of the built-in default skiplist (CLAUDE.md, .github/**, LICENSE*, ...).
      include: []
      exclude: []

# gitlab: GitLab REST API — issues, merge requests, releases (no code diffs).
gitlab:
  base_url: https://gitlab.example.com
  token:
    env: SCPBOT_GITLAB_TOKEN
  projects: "" # CSV of project IDs or paths, e.g. "group/docs,42"
  issues: true
  merge_requests: true
  releases: true

proxies:
  git:
    env: SCPBOT_GIT_PROXY
  gitlab:
    env: SCPBOT_GITLAB_PROXY
  jira:
    env: SCPBOT_JIRA_PROXY
  ollama:
    env: SCPBOT_OLLAMA_PROXY
  openrouter:
    env: SCPBOT_OPENROUTER_PROXY

jira:
  base_url: ""
  email: ""
  username: ""
  api_token:
    env: SCPBOT_JIRA_APITOKEN
  password:
    env: SCPBOT_JIRA_PASSWORD
  pat:
    env: SCPBOT_JIRA_PAT
  projects: ""

openrouter:
  api_key:
    env: SCPBOT_OPENROUTER_API_KEY
  model: openai/gpt-4o-mini

telegram:
  app_id: 0
  app_hash:
    env: SCPBOT_TELEGRAM_APP_HASH
  bot_token:
    env: SCPBOT_TELEGRAM_BOT_TOKEN
  session_dir: /data/scp/session
  monitor_chats: ""
  ingest_session: ""
