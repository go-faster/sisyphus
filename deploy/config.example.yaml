database:
  dsn:
    env: SISYPHUS_DATABASE_DSN

# api: ssapi, the HTTP API server (owns Postgres + migrations). http_addr is
# the address ssapi's own server listens on; base_url/auth_token are read by
# ssbot/ssmcp/ssagent HTTP clients to reach it.
api:
  http_addr: :8080
  base_url: http://ssapi:8080
  auth_token:
    env: SISYPHUS_API_AUTH_TOKEN

# mcp: ssmcp, the MCP server. auth_token is optional bearer auth for /mcp.
mcp:
  addr: :8081
  auth_token:
    env: SISYPHUS_MCP_AUTH_TOKEN

qdrant:
  addr: qdrant:6334
  collection: corp_chunks

ollama:
  url: http://ollama:11434

embed:
  provider: ollama
  model: bge-m3
  dim: 1024

# git: repository content (Markdown docs) + commit messages. Supports N repos;
# each is keyed independently (git_docs:<repo> / git_commits:<repo>).
git:
  work_dir: /data/git
  token:
    env: SISYPHUS_GIT_TOKEN
  repos:
    - url: https://gitlab.example.com/group/docs.git
      repo: docs
      branch: main
      base_url: ""
      # commits: index commit messages on the default branch (default false).
      commits: false
      # tags: index git tags (annotated + lightweight) as documents, source
      # git_tags:<repo> (default false).
      tags: false
      # include/exclude: doublestar globs over repo-relative paths, applied on
      # top of the built-in default skiplist (CLAUDE.md, .github/**, LICENSE*, ...).
      include: []
      exclude: []

# gitlab: GitLab REST API — issues, merge requests, releases (no code diffs).
# Issues/MRs also include assignees/reviewers, MR merge metadata (merged_at/by,
# merge commit, source/target branch), cross-references (closes/relates_to
# links), and comments grouped into discussion threads with resolved state.
gitlab:
  base_url: https://gitlab.example.com
  token:
    env: SISYPHUS_GITLAB_TOKEN
  projects:
    - ref: group/docs # Project ID or path.
  issues: true
  merge_requests: true
  releases: true
  webhook:
    enabled: false
    secret:
      env: SISYPHUS_GITLAB_WEBHOOK_SECRET
  # poll: incremental ingestion on a timer, as a supplement or fallback to
  # webhooks (e.g. GitLab instance can't reach us). 0 disables polling.
  poll:
    interval_seconds: 300

# context_files: additional local file sets to index as curated context.
# Include/exclude are doublestar globs over paths relative to root.
context_files:
  - name: runbooks
    root: /data/context/runbooks
    base_url: ""
    include: ["**/*.md", "**/*.txt"]
    exclude: []
    authority: high

proxies:
  git:
    env: SISYPHUS_GIT_PROXY
  gitlab:
    env: SISYPHUS_GITLAB_PROXY
  jira:
    env: SISYPHUS_JIRA_PROXY
  ollama:
    env: SISYPHUS_OLLAMA_PROXY
  openrouter:
    env: SISYPHUS_OPENROUTER_PROXY

jira:
  base_url: ""
  email: ""
  username: ""
  api_token:
    env: SISYPHUS_JIRA_APITOKEN
  password:
    env: SISYPHUS_JIRA_PASSWORD
  pat:
    env: SISYPHUS_JIRA_PAT
  projects: []
  webhook:
    enabled: false
    secret:
      env: SISYPHUS_JIRA_WEBHOOK_SECRET
  # poll: incremental ingestion on a timer, as a supplement or fallback to
  # webhooks. 0 disables polling.
  poll:
    interval_seconds: 300

openrouter:
  api_key:
    env: SISYPHUS_OPENROUTER_API_KEY
  model: openai/gpt-4o-mini

# context: agentic /context workflow settings.
context:
  agentic: false
  max_iterations: 6
  timeout_seconds: 180
  max_answer_chars: 2000
  ssh_mcp_url: ""
  ssh_mcp_headers: {}
  sandbox_machine: sandbox
  pre_search: true
  pre_search_limit: 12

# telegram: ssbot. addr is the address ssbot's standalone health/ready HTTP
# server listens on (ssbot has no primary HTTP API of its own).
telegram:
  addr: :8083
  app_id: 0
  app_hash:
    env: SISYPHUS_TELEGRAM_APP_HASH
  bot_token:
    env: SISYPHUS_TELEGRAM_BOT_TOKEN
  session_dir: /data/scp/session
  monitor_chats: []
  ingest_session: ""
  # allowed_chats and allowed_user_ids: fail-closed allowlist for the bot.
  # If both are empty, the bot will not respond to anyone and log a warning.
  # List chat IDs (can be negative for groups/channels) and user IDs separately.
  allowed_chats: []
  allowed_user_ids: []

# agent: ssagent, the on-demand investigation service. base_url is read by
# ssbot to reach ssagent for the /investigate command (leave empty to disable
# /investigate in ssbot). gateway_url points at the mcpgateway instance that
# fans out to Grafana/Alertmanager/Jira/GitLab/knowledge-base MCP servers.
# /investigate jobs are persisted in Postgres (database.dsn, required):
# ssagent connects to it but never runs migrations itself, so ssapi must have
# applied them first.
agent:
  addr: :8082
  base_url: http://ssagent:8082
  auth_token:
    env: SISYPHUS_AGENT_AUTH_TOKEN
  model: openai/gpt-4o
  max_tool_iterations: 8
  request_timeout_seconds: 180
  gateway_url: http://mcpgateway:8090/mcp
  # Character budget for the assembled report; if the model's first
  # submit_report exceeds this, it's asked once to resubmit a shorter one.
  max_report_chars: 1500
  # Caps how many investigations run concurrently; each one holds an LLM
  # tool-calling loop open for up to request_timeout_seconds. /investigate is
  # async (202 + job ID, persisted in Postgres via database.dsn - ssagent
  # connects but does not migrate), so extra requests aren't rejected: the
  # job is accepted and queued as pending until a worker slot frees up.
  max_concurrent: 4
  # Request body size cap in bytes for POST /investigate.
  max_body_bytes: 65536
