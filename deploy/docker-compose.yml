name: sisyphus

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sisyphus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sisyphus}
      POSTGRES_DB: ${POSTGRES_DB:-sisyphus}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sisyphus}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.18.2-unprivileged
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4317
      QDRANT__SERVICE__METRICS_PREFIX: qdrant
    ports:
      - "6333:6333" # REST
      - "6334:6334" # gRPC
    volumes:
      - qdrant:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:0.30.11
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4317
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    # Pull the embedding model on first run:
    #   docker compose exec ollama ollama pull bge-m3

  ssapi:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    entrypoint: [ "/usr/local/bin/ssapi" ]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      SISYPHUS_CONFIG: /data/scp/config.yaml
      SISYPHUS_DATABASE_DSN: ${SISYPHUS_DATABASE_DSN:-postgres://sisyphus:sisyphus@postgres:5432/sisyphus?sslmode=disable}
      SISYPHUS_API_AUTH_TOKEN: ${SISYPHUS_API_AUTH_TOKEN:-}
      SISYPHUS_GITLAB_TOKEN: ${SISYPHUS_GITLAB_TOKEN:-}
      SISYPHUS_GITLAB_WEBHOOK_SECRET: ${SISYPHUS_GITLAB_WEBHOOK_SECRET:-}
      SISYPHUS_JIRA_PASSWORD: ${SISYPHUS_JIRA_PASSWORD:-}
      SISYPHUS_JIRA_WEBHOOK_SECRET: ${SISYPHUS_JIRA_WEBHOOK_SECRET:-}
      SISYPHUS_OPENROUTER_API_KEY: ${SISYPHUS_OPENROUTER_API_KEY:-}
      OTEL_LOG_LEVEL: debug
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4317
      OTEL_EXPORTER_OTLP_INSECURE: true
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    ports:
      - "18079:8080"
    volumes:
      - ./config.yaml:/data/scp/config.yaml:ro
      - ssapi:/data/scp
    healthcheck:
      test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/8080' || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10

  ssmcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    entrypoint: [ "/usr/local/bin/ssmcp" ]
    depends_on:
      ssapi:
        condition: service_healthy
    environment:
      SISYPHUS_CONFIG: /data/scp/config.yaml
      SISYPHUS_DATABASE_DSN: ${SISYPHUS_DATABASE_DSN:-postgres://sisyphus:sisyphus@postgres:5432/sisyphus?sslmode=disable}
      SISYPHUS_GITLAB_TOKEN: ${SISYPHUS_GITLAB_TOKEN:-}
      SISYPHUS_JIRA_PASSWORD: ${SISYPHUS_JIRA_PASSWORD:-}
      SISYPHUS_AGENT_AUTH_TOKEN: ${SISYPHUS_AGENT_AUTH_TOKEN:-}
      SISYPHUS_OPENROUTER_API_KEY: ${SISYPHUS_OPENROUTER_API_KEY:-}
      OTEL_LOG_LEVEL: debug
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4317
      OTEL_EXPORTER_OTLP_INSECURE: true
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    ports:
      - "18081:8081"
    volumes:
      - ./config.yaml:/data/scp/config.yaml:ro
      - ssmcp:/data/scp

  sisyphus:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    entrypoint: [ "/usr/local/bin/ssbot" ]
    depends_on:
      ssapi:
        condition: service_healthy
    environment:
      SISYPHUS_CONFIG: /data/scp/config.yaml
      SISYPHUS_DATABASE_DSN: ${SISYPHUS_DATABASE_DSN:-postgres://sisyphus:sisyphus@postgres:5432/sisyphus?sslmode=disable}
      SISYPHUS_GITLAB_TOKEN: ${SISYPHUS_GITLAB_TOKEN:-}
      SISYPHUS_JIRA_PASSWORD: ${SISYPHUS_JIRA_PASSWORD:-}
      SISYPHUS_OPENROUTER_API_KEY: ${SISYPHUS_OPENROUTER_API_KEY:-}
      OTEL_LOG_LEVEL: debug
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4317
      OTEL_EXPORTER_OTLP_INSECURE: true
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    ports:
      - "18080:8083"
    volumes:
      - ./config.yaml:/data/scp/config.yaml:ro
      - ssbot:/data/scp

  mcpgateway:
    image: ghcr.io/go-faster/gooners/mcpgateway:latest
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    volumes:
      - ./mcpgateway.toml.example:/etc/mcpgateway/config.toml:ro
    command: ["-config", "/etc/mcpgateway/config.toml", "-transport", "streamable-http", "-addr", ":8090"]
    depends_on:
      - ssmcp

  ssagent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    entrypoint: [ "/usr/local/bin/ssagent" ]
    depends_on:
      - mcpgateway
    environment:
      SISYPHUS_CONFIG: /data/scp/config.yaml
      SISYPHUS_DATABASE_DSN: ${SISYPHUS_DATABASE_DSN:-postgres://sisyphus:sisyphus@postgres:5432/sisyphus?sslmode=disable}
      SISYPHUS_AGENT_AUTH_TOKEN: ${SISYPHUS_AGENT_AUTH_TOKEN:-}
      SISYPHUS_OPENROUTER_API_KEY: ${SISYPHUS_OPENROUTER_API_KEY:-}
      OTEL_LOG_LEVEL: debug
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otelcol:4317
      OTEL_EXPORTER_OTLP_INSECURE: true
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    ports:
      - "18082:8082"
    volumes:
      - ./config.yaml:/data/scp/config.yaml:ro
      - ssagent:/data/scp

  otelcol:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.150.1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    user: 0:0
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./otelcol/otelcol.yml:/etc/otelcol-contrib/config.yaml:ro
      - otelcol:/var/lib/otelcol
    environment:
      - OTEL_EXPORTER_OTLP_TRACES_PROTOCOL=none
      - POSTGRESQL_ENDPOINT=${POSTGRESQL_ENDPOINT:-postgres:5432}
      - POSTGRESQL_USERNAME=${POSTGRESQL_USERNAME:-sisyphus}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD:-sisyphus}
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE:-sisyphus}
      - QDRANT_METRICS_ENDPOINT=${QDRANT_METRICS_ENDPOINT:-qdrant:6333}
    command:
      - "--config"
      - "/etc/otelcol-contrib/config.yaml"

volumes:
  pgdata:
  qdrant:
  ollama:
  ssapi:
  ssmcp:
  ssbot:
  ssagent:
  otelcol:
